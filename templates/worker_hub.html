<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fogos Piromax</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Piromax">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#7c3aed">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f7ff; color: #2d3748; min-height: 100vh; }

header {
  background: white; border-bottom: 1px solid #ede9fe;
  box-shadow: 0 1px 8px rgba(124,58,237,0.07);
  padding: 14px 20px; display: flex; align-items: center; gap: 10px;
}
.header-logo {
  width: 40px; height: 40px; background: white; border-radius: 10px;
  overflow: hidden; padding: 3px; border: 1px solid #ede9fe; flex-shrink: 0;
}
.header-logo img { width: 100%; height: 100%; object-fit: contain; }
.header-brand-text .title { font-size: 0.98rem; font-weight: 700; color: #1e1b4b; }
.header-brand-text .sub { font-size: 0.7rem; color: #9ca3af; }

.container { max-width: 480px; margin: 48px auto; padding: 0 20px; }
.hub-title { font-size: 1.35rem; font-weight: 800; color: #1e1b4b; text-align: center; margin-bottom: 6px; }
.hub-date { text-align: center; font-size: 0.82rem; color: #9ca3af; margin-bottom: 36px; }

.modules { display: flex; flex-direction: column; gap: 16px; }
.module-card {
  background: white; border-radius: 16px; padding: 22px 24px;
  box-shadow: 0 2px 12px rgba(124,58,237,0.07); border: 1.5px solid #ede9fe;
  text-decoration: none; color: inherit;
  display: flex; align-items: center; gap: 18px;
  transition: all 0.18s;
}
.module-card:hover {
  border-color: #c4b5fd; box-shadow: 0 4px 18px rgba(124,58,237,0.13);
  transform: translateY(-1px);
}
.module-icon {
  width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  background: #f5f3ff;
}
.module-info { flex: 1; }
.module-title { font-size: 1rem; font-weight: 700; color: #1e1b4b; margin-bottom: 3px; }
.module-desc { font-size: 0.8rem; color: #6b7280; }
.module-arrow { color: #c4b5fd; font-size: 1.4rem; flex-shrink: 0; }

.app-footer {
  text-align: center; padding: 24px 20px 40px; font-size: 0.78rem; color: #9ca3af;
  border-top: 1px solid #ede9fe; margin-top: 40px;
}
.app-footer a { color: #7c3aed; text-decoration: none; font-weight: 600; }
.app-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="/static/logo.png" alt="Piromax">
  </div>
  <div class="header-brand-text">
    <div class="title">Fogos Piromax</div>
    <div class="sub">Gestão da Produção</div>
  </div>
</header>

<div class="container">
  <h1 class="hub-title">O que deseja fazer?</h1>
  <p class="hub-date" id="hubDate"></p>

  <div class="modules">

    <a href="/pedidos" class="module-card">
      <div class="module-icon">📦</div>
      <div class="module-info">
        <div class="module-title">Pedidos Especiais</div>
        <div class="module-desc">Pedidos com produção estendida por cliente</div>
      </div>
      <div class="module-arrow">›</div>
    </a>

    <a href="/producao" class="module-card">
      <div class="module-icon">📋</div>
      <div class="module-info">
        <div class="module-title">Controle de Produção</div>
        <div class="module-desc">Acesse a programação de produção</div>
      </div>
      <div class="module-arrow">›</div>
    </a>

    <a href="/requests" class="module-card">
      <div class="module-icon">📨</div>
      <div class="module-info">
        <div class="module-title">Solicitações</div>
        <div class="module-desc">Envie e acompanhe suas solicitações</div>
      </div>
      <div class="module-arrow">›</div>
    </a>

  </div>
</div>

<footer class="app-footer">
  Você é o gestor? <a href="/admin">Acessar o Painel do Gestor →</a>
</footer>

<script>
(function() {
  const d = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('hubDate').textContent = d.toLocaleDateString('pt-BR', opts);
})();
</script>
</body>
</html>
