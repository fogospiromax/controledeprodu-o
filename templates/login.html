<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    .login-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #7c3aed;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      text-align: left;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover {
      opacity: 0.92;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🎆</div>
    <div class="login-title">Fogos Piromax</div>
    <div class="login-subtitle">Área do Gestor — acesso restrito</div>

    {% if error %}
    <div class="error-msg">🔒 {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username"
             placeholder="Digite o usuário" autofocus autocomplete="username"
             style="margin-bottom:16px;">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password"
             placeholder="Digite a senha" autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
