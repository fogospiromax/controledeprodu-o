<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor — Login</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Piromax">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#7c3aed">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f8f7ff; color: #2d3748; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: white; border-radius: 18px;
  box-shadow: 0 4px 28px rgba(124,58,237,0.10);
  padding: 48px 40px 36px; width: 100%; max-width: 380px; text-align: center;
  border: 1.5px solid #ede9fe;
}
.login-logo {
  display: flex; justify-content: center; margin-bottom: 16px;
}
.login-logo img {
  width: 56px; height: 56px; border-radius: 14px; object-fit: contain;
  border: 1.5px solid #ede9fe; padding: 4px;
}
.login-title { font-size: 1.2rem; font-weight: 800; color: #1e1b4b; margin-bottom: 4px; }
.login-badge {
  display: inline-block; background: #f5f3ff; color: #7c3aed;
  border: 1.5px solid #ede9fe; border-radius: 20px;
  padding: 4px 14px; font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.3px; margin-bottom: 28px;
}
label {
  display: block; text-align: left; font-size: 0.82rem;
  font-weight: 700; color: #6b7280; text-transform: uppercase;
  letter-spacing: 0.3px; margin-bottom: 6px;
}
input[type="text"], input[type="password"] {
  width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb;
  border-radius: 9px; font-size: 0.95rem; color: #1e1b4b; outline: none;
  transition: border-color 0.2s; margin-bottom: 16px; font-family: inherit;
}
input[type="text"]:focus, input[type="password"]:focus {
  border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
}
.error-msg {
  background: #fff5f5; border: 1px solid #fca5a5; color: #dc2626;
  border-radius: 8px; padding: 10px 14px; font-size: 0.88rem;
  margin-bottom: 16px; text-align: left;
}
button[type="submit"] {
  width: 100%; padding: 12px; background: #7c3aed;
  color: white; border: none; border-radius: 9px; font-size: 0.95rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
button[type="submit"]:hover { background: #6d28d9; }
.worker-hint {
  margin-top: 20px; font-size: 0.8rem; color: #9ca3af;
}
.worker-hint a {
  color: #7c3aed; text-decoration: none; font-weight: 600;
}
.worker-hint a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="/static/logo.png" alt="Piromax Fogos">
  </div>
  <div class="login-title">Fogos Piromax</div>
  <div class="login-badge">Área restrita — Acesso do Gestor</div>

  {% if error %}
  <div class="error-msg">🔒 {{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <label for="username">Usuário</label>
    <input type="text" id="username" name="username"
           placeholder="Digite o usuário" autofocus autocomplete="username">
    <label for="password">Senha</label>
    <input type="password" id="password" name="password"
           placeholder="Digite a senha" autocomplete="current-password"
           style="margin-bottom: 20px;">
    <button type="submit">Entrar</button>
  </form>

  <div class="worker-hint">
    Trabalhador? <a href="/">Acesse aqui sem login →</a>
  </div>
</div>
</body>
</html>
