<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produção – Gestor — Fogos Piromax</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Piromax">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#7c3aed">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f7ff; color: #2d3748; min-height: 100vh; }
  /* ── Header ── */
  header {
    background: white; border-bottom: 1px solid #ede9fe;
    box-shadow: 0 1px 8px rgba(124,58,237,0.07);
    position: sticky; top: 0; z-index: 50;
    padding: 12px 20px; display: flex; align-items: center; gap: 8px;
  }
  .header-left { display: flex; align-items: center; gap: 8px; flex: 1; }
  .back-btn {
    width: 34px; height: 34px; background: #f5f3ff; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #7c3aed; font-size: 1.1rem; text-decoration: none; font-weight: 700;
    border: 1.5px solid #ede9fe; flex-shrink: 0; line-height: 1;
  }
  .back-btn:hover { background: #ede9fe; }
  .header-logo {
    width: 40px; height: 40px; background: white; border-radius: 10px;
    overflow: hidden; padding: 3px; border: 1px solid #ede9fe; flex-shrink: 0;
  }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; }
  .header-brand-text .title { font-size: 0.98rem; font-weight: 700; color: #1e1b4b; }
  .header-brand-text .sub { font-size: 0.7rem; color: #9ca3af; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .gestor-badge {
    background: #f5f3ff; color: #7c3aed; border: 1.5px solid #ede9fe;
    border-radius: 8px; padding: 5px 10px; font-size: 0.72rem; font-weight: 800;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  .btn-logout {
    background: none; border: 1.5px solid #e5e7eb; border-radius: 8px;
    padding: 6px 10px; font-size: 0.78rem; font-weight: 600;
    color: #6b7280; text-decoration: none; transition: all 0.15s;
  }
  .btn-logout:hover { border-color: #c4b5fd; color: #7c3aed; }
  .btn-print { background:#fff; color:#7c3aed; border:1.5px solid #c4b5fd; border-radius:9px; padding:7px 12px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; }
  .btn-print:hover { background:#f3f0ff; }
  /* ── Footer ── */
  .app-footer {
    text-align: center; padding: 24px 20px 40px; font-size: 0.78rem; color: #9ca3af;
    border-top: 1px solid #ede9fe; margin-top: 20px;
  }
  .app-footer a { color: #7c3aed; text-decoration: none; font-weight: 600; }
  .app-footer a:hover { text-decoration: underline; }
  .page { max-width:680px; margin:28px auto; padding:0 16px 100px; }
  .week-nav { background:#fff; border-radius:14px; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .week-nav-btn { background:none; border:1.5px solid #e5e7eb; border-radius:8px; width:34px; height:34px; font-size:16px; cursor:pointer; color:#7c3aed; display:flex; align-items:center; justify-content:center; }
  .week-nav-btn:hover { background:#f3f0ff; }
  .week-label { text-align:center; }
  .week-label-main { font-size:16px; font-weight:700; color:#1f1235; }
  .week-label-sub { font-size:12px; color:#9ca3af; margin-top:2px; }
  .add-card { background:#fff; border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); border:1.5px dashed #c4b5fd; }
  .add-card-title { font-size:12px; font-weight:600; color:#7c3aed; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
  .add-row { display:flex; gap:8px; }
  .add-input { flex:1; border:1.5px solid #e5e7eb; border-radius:9px; padding:9px 12px; font-size:14px; font-family:inherit; color:#1f1235; outline:none; }
  .add-input:focus { border-color:#7c3aed; }
  .btn-add { background:#7c3aed; color:#fff; border:none; border-radius:9px; padding:9px 18px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .btn-add:hover { background:#6d28d9; }
  .emp-card { background:#fff; border-radius:14px; padding:16px 18px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .emp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .emp-info { display:flex; align-items:center; gap:10px; }
  .avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
  .emp-name { font-size:15px; font-weight:700; color:#1f1235; }
  .emp-filled { font-size:12px; color:#9ca3af; }
  .btn-remove { background:none; border:1.5px solid #fca5a5; color:#ef4444; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-remove:hover { background:#fef2f2; }
  .day-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid #f3f4f6; }
  .day-row:last-child { border-bottom:none; }
  .day-label { width:106px; flex-shrink:0; }
  .day-name-wrap { display:flex; align-items:center; gap:5px; }
  .day-dot { width:6px; height:6px; border-radius:50%; background:#7c3aed; display:none; }
  .day-row.monday .day-dot { display:block; }
  .day-name { font-size:13px; font-weight:600; color:#374151; }
  .day-row.monday .day-name { color:#7c3aed; }
  .day-date { font-size:11px; color:#9ca3af; }
  .day-row.monday .day-date { color:#a78bfa; }
  .day-input { flex:1; border:1.5px solid #e5e7eb; border-radius:8px; padding:7px 10px; font-size:13px; font-family:inherit; color:#1f1235; outline:none; transition:border-color .15s, background .15s; }
  .day-input:focus { border-color:#7c3aed; background:#faf5ff; }
  .day-input.filled { border-color:#a78bfa; background:#faf5ff; color:#6d28d9; font-weight:500; }
  .day-input::placeholder { color:#d8b4fe; }
  .save-bar { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(transparent,#f8f7ff 40%); padding:20px 16px 16px; }
  .save-bar-inner { max-width:680px; margin:0 auto; }
  .btn-save { width:100%; background:#7c3aed; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(124,58,237,.25); }
  .btn-save:hover { background:#6d28d9; }
  .btn-save:disabled { background:#a78bfa; cursor:not-allowed; box-shadow:none; }
  .loading { text-align:center; color:#9ca3af; padding:40px 0; font-size:14px; }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px); background:#1f1235; color:#fff; padding:9px 20px; border-radius:99px; font-size:13px; font-weight:600; opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .print-header { display:none; text-align:center; margin-bottom:14px; }
  .print-header h2 { font-size:17px; color:#1f1235; }
  .print-header p { font-size:12px; color:#6b7280; margin-top:3px; }
  @media print {
    header, .app-footer, .add-card, .btn-remove, .week-nav-btn, .save-bar, .btn-print { display:none !important; }
    body { background:#fff; }
    .page { margin:0; padding:0; max-width:100%; }
    .emp-card { box-shadow:none; border:1px solid #e5e7eb; break-inside:avoid; }
    .day-input { border:none; background:transparent !important; padding:7px 0; }
    .day-input.filled { color:#1f1235 !important; font-weight:600; }
    .week-nav { box-shadow:none; border:1px solid #e5e7eb; }
    .print-header { display:block !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/admin" class="back-btn">←</a>
    <div class="header-logo">
      <img src="/static/logo.png" alt="Piromax">
    </div>
    <div class="header-brand-text">
      <div class="title">Fogos Piromax</div>
      <div class="sub">Área do Gestor</div>
    </div>
  </div>
  <div class="header-right">
    <span class="gestor-badge">👔 GESTOR</span>
    <button class="btn-print" onclick="window.print()">🖨️ PDF</button>
    <a href="/admin/logout" class="btn-logout">🚪 Sair</a>
  </div>
</header>

<div class="page">
  <div class="print-header">
    <h2>Fogos Piromax — Programação de Produção</h2>
    <p id="print-week-label"></p>
  </div>

  <div class="week-nav">
    <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-label">
      <div class="week-label-main" id="week-range">—</div>
      <div class="week-label-sub" id="week-year">carregando…</div>
    </div>
    <button class="week-nav-btn" onclick="changeWeek(1)">›</button>
  </div>

  <div class="add-card">
    <div class="add-card-title">+ Adicionar Funcionário</div>
    <div class="add-row">
      <input class="add-input" type="text" id="new-emp-name" placeholder="Nome do funcionário…" onkeydown="if(event.key==='Enter')addEmployee()">
      <button class="btn-add" onclick="addEmployee()">Adicionar</button>
    </div>
  </div>

  <div id="emp-list"><div class="loading">Carregando programação…</div></div>
</div>

<div class="save-bar">
  <div class="save-bar-inner">
    <button class="btn-save" id="btn-save" onclick="saveWeek()">💾 Salvar semana</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="app-footer">
  <a href="/">← Ver área dos trabalhadores</a>
</footer>

<script>
const DEFAULT_WEEK = "{{ default_week }}";
const AVATARS = [
  ['#7c3aed','#a78bfa'],['#0891b2','#67e8f9'],['#059669','#6ee7b7'],
  ['#d97706','#fcd34d'],['#dc2626','#fca5a5'],['#be185d','#fbcfe8'],
];

function parseDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d) { return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function isoDate(d) { return d.toISOString().slice(0,10); }

const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const DAY_KEYS = ['mon','tue','wed','thu','fri'];

let weekStart = parseDate(DEFAULT_WEEK);
let employees = []; // [{name, mon, tue, wed, thu, fri}]
let loading = false;

function updateHeader() {
  const end = addDays(weekStart, 4);
  const rangeStr = `${fmt(weekStart)} – ${fmt(end)}`;
  document.getElementById('week-range').textContent = rangeStr;
  document.getElementById('week-year').textContent =
    weekStart.toLocaleDateString('pt-BR',{month:'long'}) + ' · ' + weekStart.getFullYear();
  const pl = document.getElementById('print-week-label');
  if (pl) pl.textContent = `Semana ${rangeStr} · ${weekStart.getFullYear()}`;
}

async function loadWeek() {
  const ws = isoDate(weekStart);
  document.getElementById('emp-list').innerHTML = '<div class="loading">Carregando…</div>';
  try {
    const res = await fetch(`/api/producao-semana?week_start=${ws}`);
    const rows = await res.json();
    employees = rows.map(r => ({
      name: r.employee_name,
      mon: r.mon||'', tue: r.tue||'', wed: r.wed||'', thu: r.thu||'', fri: r.fri||''
    }));
  } catch(e) {
    employees = [];
  }
  renderList();
}

function renderList() {
  updateHeader();
  const list = document.getElementById('emp-list');
  list.innerHTML = '';
  if (!employees.length) {
    list.innerHTML = '<div class="loading">Nenhum funcionário nesta semana. Adicione acima.</div>';
    return;
  }
  employees.forEach((emp, ei) => {
    const ci = ei % AVATARS.length;
    const grad = `linear-gradient(135deg,${AVATARS[ci][0]},${AVATARS[ci][1]})`;
    const initials = emp.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const filled = DAY_KEYS.filter(k => emp[k].trim()).length;

    const card = document.createElement('div');
    card.className = 'emp-card';
    card.dataset.ei = ei;
    card.innerHTML = `
      <div class="emp-header">
        <div class="emp-info">
          <div class="avatar" style="background:${grad}">${initials}</div>
          <div>
            <div class="emp-name">${emp.name}</div>
            <div class="emp-filled">${filled}/5 dias preenchidos</div>
          </div>
        </div>
        <button class="btn-remove" onclick="removeEmployee(${ei})">🗑 remover</button>
      </div>`;

    DAY_KEYS.forEach((key, di) => {
      const date = addDays(weekStart, di);
      const row = document.createElement('div');
      row.className = 'day-row' + (di===0?' monday':'');
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'day-input' + (emp[key]?' filled':'');
      inp.placeholder = 'Produto…';
      inp.value = emp[key];
      inp.addEventListener('input', e => {
        employees[ei][key] = e.target.value;
        e.target.classList.toggle('filled', !!e.target.value.trim());
        const f = DAY_KEYS.filter(k=>employees[ei][k].trim()).length;
        card.querySelector('.emp-filled').textContent = `${f}/5 dias preenchidos`;
      });
      row.innerHTML = `
        <div class="day-label">
          <div class="day-name-wrap"><div class="day-dot"></div><span class="day-name">${DAYS[di]}</span></div>
          <span class="day-date">${fmt(date)}</span>
        </div>`;
      row.appendChild(inp);
      card.appendChild(row);
    });
    list.appendChild(card);
  });
}

function addEmployee() {
  const inp = document.getElementById('new-emp-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  if (employees.find(e => e.name.toLowerCase() === name.toLowerCase())) {
    showToast('⚠️ Funcionário já existe nesta semana');
    return;
  }
  employees.push({name, mon:'', tue:'', wed:'', thu:'', fri:''});
  inp.value = '';
  renderList();
  setTimeout(() => {
    const cards = document.querySelectorAll('.emp-card');
    cards[cards.length-1]?.scrollIntoView({behavior:'smooth',block:'center'});
  }, 50);
}

function removeEmployee(ei) {
  const emp = employees[ei];
  const ws = isoDate(weekStart);
  employees.splice(ei, 1);
  renderList();
  // Remove from DB if exists
  fetch('/admin/producao/remover', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name: emp.name, week_start: ws})
  });
}

async function saveWeek() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '⏳ Salvando…';
  try {
    const res = await fetch('/admin/producao/salvar', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        week_start: isoDate(weekStart),
        employees: employees.map(e => ({name:e.name, mon:e.mon, tue:e.tue, wed:e.wed, thu:e.thu, fri:e.fri}))
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ Semana salva com sucesso!');
    } else {
      showToast('❌ Erro ao salvar: ' + (data.error||''));
    }
  } catch(e) {
    showToast('❌ Erro de conexão');
  }
  btn.disabled = false;
  btn.textContent = '💾 Salvar semana';
}

function changeWeek(dir) {
  weekStart = addDays(weekStart, dir*7);
  loadWeek();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Init
loadWeek();
</script>
</body>
</html>
